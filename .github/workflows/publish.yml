name: Publish to PyPI

# Publishes tracesnap to PyPI when a version tag is pushed (e.g. `v0.1.0`).
# Also runnable manually from the Actions tab — when triggered manually it
# publishes to TestPyPI instead, so you can dry-run before cutting a real tag.
#
# Authentication uses PyPI's Trusted Publishing (OIDC). There is no API token
# to manage. Setup steps (one-time, done in the PyPI UI):
#   1. https://pypi.org/manage/account/publishing/ -> Add a pending publisher
#      - Project name: tracesnap
#      - Owner: bangi98
#      - Repository: mindplayer
#      - Workflow filename: publish.yml
#      - Environment name: pypi
#   2. Repeat the same on https://test.pypi.org for the TestPyPI dry-run path,
#      using environment name `testpypi`.
#   3. In this GitHub repo: Settings -> Environments -> add `pypi` and `testpypi`.
#      Optionally require a reviewer on `pypi` so a release can't ship on its own.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      target:
        description: 'Where to publish'
        required: true
        default: 'testpypi'
        type: choice
        options:
          - testpypi
          - pypi

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - name: Check out the source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: python -m pip install --upgrade pip build twine

      - name: Build distributions
        run: python -m build

      - name: Twine check
        run: python -m twine check --strict dist/*

      - name: Inspect wheel contents
        run: |
          echo "::group::Wheel file list"
          python -m zipfile -l dist/*.whl
          echo "::endgroup::"
          # Sanity: the player HTML files MUST end up inside the wheel.
          if ! python -m zipfile -l dist/*.whl | grep -q 'tracesnap/player/.*\.html'; then
            echo "ERROR: player HTML files are missing from the wheel"
            exit 1
          fi

      - name: Upload built artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # Real PyPI: only when a `v*` tag is pushed, or when a manual run picks pypi.
    if: ${{ startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.target == 'pypi') }}
    environment:
      name: pypi
      url: https://pypi.org/p/tracesnap
    permissions:
      id-token: write          # required for OIDC trusted publishing
    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # No `password:` field — OIDC handles auth via the `pypi` environment.

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    # TestPyPI: only on manual runs that pick testpypi (default).
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi' }}
    environment:
      name: testpypi
      url: https://test.pypi.org/p/tracesnap
    permissions:
      id-token: write
    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
